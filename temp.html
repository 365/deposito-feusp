<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>


  <div class="membro-card">
    <h6 class="fw-bold text-dark">SEGUNDO TITULAR</h6>

    <div class="mb-3">
      <label class="form-label">Prof. (a) Dr. (a):</label>
      <select class="form-select custom-input" id="nomeTitular2">
        <option value="">Selecione o Segundo Titular...</option>
      </select>
      <!-- <input type="text" class="form-control custom-input" id="nomeTitular2">-->
    </div>

    <div class="mb-3">
      <label for="emailTitular2" class="form-label">E-mail</label>
      <input type="email" class="form-control custom-input" id="emailTitular2" placeholder="seuemail@dominio.com.br"
        onblur="validarEmail('emailTitular2')">
    </div>

    <div class="mb-3">
      <label class="form-label">Instituição de vínculo:</label>
      <input type="text" class="form-control custom-input" id="vinculoTitular2" placeholder="Ex: USP, UNICAMP...">
    </div>

    <div class="mb-3">
      <label class="form-label d-block fw-bold">Participação:</label>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="part2" id="part2Presencial" value="Presencial"
          onchange="toggleLogistica(2, true)">
        <label class="form-check-label" for="part2Presencial">Presencial</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="part2" id="part2Distancia" value="Distancia"
          onchange="toggleLogistica(2, false)">
        <label class="form-check-label" for="part2Distancia">Distância</label>
      </div>
    </div>

    <!-- Logística (Diária/Passagem) -->
    <div id="logistica2" class="d-none">
      <div class="divisor-interno"></div>

      <label class="form-label fw-bold">Precisa de diária?</label>
      <div class="form-check form-check-inline ms-2">
        <input class="form-check-input" type="radio" name="diaria2" id="diaria2Sim" value="Sim"
          onchange="toggleUpload(2, true)">
        <label class="form-check-label" for="diaria2Sim">Sim</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="diaria2" id="diaria2Nao" value="Nao"
          onchange="toggleUpload(2, false)">
        <label class="form-check-label" for="diaria2Nao">Não</label>
      </div>

      <!-- Upload de Passagem -->
      <div id="campoUpload2" class="d-none mt-3">
        <div class="mb-3">
          <label class="small fw-bold d-block mb-2">Tipo de Passagem:</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipoPassagem2" id="aerea2" value="Aerea">
            <label class="small" for="aerea2">Aérea</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipoPassagem2" id="rodoviaria2" value="Rodoviaria">
            <label class="small" for="rodoviaria2">Rodoviária</label>
          </div>
        </div>

        <div class="divisor-interno"></div>

        <label class="form-label text-danger small fw-bold">Anexar Cadastro de Professor (PDF/DOC):</label>
        <input class="form-control form-control-sm" type="file" id="arquivoDiaria2" accept=".pdf,.doc,.docx">
      </div>
    </div>
  </div>
  <!-- FIM SEGUNDO TITULAR -->


</body>

</html>
